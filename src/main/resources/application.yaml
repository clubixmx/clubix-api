spring:
  application:
    name: clubix-api

server:
  port: 8080

---
spring:
  config:
    activate:
      on-profile: local
  r2dbc:
    url: r2dbc:h2:mem:///clubixdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
